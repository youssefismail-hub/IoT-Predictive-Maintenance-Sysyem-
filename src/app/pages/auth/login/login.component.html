<div class="auth-container">
  <div class="auth-card fade-in">
    <div class="auth-header">
      <h1>IoT Maintenance</h1>
      <p class="text-muted">Sign in to your account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          class="form-control"
          placeholder="you@example.com"
          [class.error]="email?.invalid && email?.touched"
        />
        <div class="form-error" *ngIf="email?.invalid && email?.touched">
          <span *ngIf="email?.errors?.['required']">Email is required</span>
          <span *ngIf="email?.errors?.['email']">Please enter a valid email</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          class="form-control"
          placeholder="••••••••"
          [class.error]="password?.invalid && password?.touched"
        />
        <div class="form-error" *ngIf="password?.invalid && password?.touched">
          <span *ngIf="password?.errors?.['required']">Password is required</span>
          <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters</span>
        </div>
      </div>

      <div class="alert alert-danger" *ngIf="error">
        {{ error }}
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-full" [disabled]="loading || loginForm.invalid">
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading" class="flex items-center gap-sm">
          <div class="spinner-sm"></div>
          Signing in...
        </span>
      </button>

      <div class="auth-footer">
        <p class="text-muted">
          Don't have an account?
          <a routerLink="/register" class="link">Sign up</a>
        </p>
      </div>
    </form>
  </div>
</div>
