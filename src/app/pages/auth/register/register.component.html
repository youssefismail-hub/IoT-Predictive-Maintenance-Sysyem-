<div class="auth-container">
    <div class="auth-card fade-in">
        <div class="auth-header">
            <h1>Create Account</h1>
            <p class="text-muted">Join the IoT Maintenance Platform</p>
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
            <div class="form-group">
                <label class="form-label" for="name">Full Name</label>
                <input type="text" id="name" formControlName="name" class="form-control" placeholder="John Doe"
                    [class.error]="name?.invalid && name?.touched" />
                <div class="form-error" *ngIf="name?.invalid && name?.touched">
                    <span *ngIf="name?.errors?.['required']">Name is required</span>
                    <span *ngIf="name?.errors?.['minlength']">Name must be at least 2 characters</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" formControlName="email" class="form-control"
                    placeholder="you@example.com" [class.error]="email?.invalid && email?.touched" />
                <div class="form-error" *ngIf="email?.invalid && email?.touched">
                    <span *ngIf="email?.errors?.['required']">Email is required</span>
                    <span *ngIf="email?.errors?.['email']">Please enter a valid email</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="role">Role</label>
                <select id="role" formControlName="role" class="form-control">
                    <option [value]="roles.TECHNICIAN">Technician</option>
                    <option [value]="roles.ADMIN">Administrator</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" formControlName="password" class="form-control"
                    placeholder="••••••••" [class.error]="password?.invalid && password?.touched" />
                <div class="form-error" *ngIf="password?.invalid && password?.touched">
                    <span *ngIf="password?.errors?.['required']">Password is required</span>
                    <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" formControlName="confirmPassword" class="form-control"
                    placeholder="••••••••" [class.error]="confirmPassword?.invalid && confirmPassword?.touched" />
                <div class="form-error" *ngIf="registerForm.errors?.['mismatch'] && confirmPassword?.touched">
                    Passwords do not match
                </div>
            </div>

            <div class="alert alert-danger" *ngIf="error">
                {{ error }}
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-full" [disabled]="loading || registerForm.invalid">
                <span *ngIf="!loading">Create Account</span>
                <span *ngIf="loading" class="flex items-center gap-sm">
                    <div class="spinner-sm"></div>
                    Creating account...
                </span>
            </button>

            <div class="auth-footer">
                <p class="text-muted">
                    Already have an account?
                    <a routerLink="/login" class="link">Sign in</a>
                </p>
            </div>
        </form>
    </div>
</div>
